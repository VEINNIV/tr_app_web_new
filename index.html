<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="theme-color" content="#0057FF" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-title" content="TransWordly" />
    <meta name="application-name" content="TransWordly" />

    <!-- SEO -->
    <meta name="description" content="TransWordly — AI destekli belge çevirisi. PDF, Word ve slaytlarınızı 12 dilden Türkçe'ye dakikalar içinde çevirin. Ders notu çıkarın, AI'a soru sorun." />
    <meta name="keywords" content="çeviri, PDF çeviri, akademik çeviri, ders notu, AI çeviri, Türkçe çeviri, belge çeviri, makale çeviri, yapay zeka çeviri, TransWordly" />
    <meta name="author" content="TransWordly" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="canonical" href="https://transwordly.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="TransWordly" />
    <meta property="og:description" content="Akademik makaleler ve belgeleri 12 dilden Türkçe'ye AI ile dakikalar içinde çevirin. Ders notu çıkarın, AI'a soru sorun." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://transwordly.com/" />
    <meta property="og:image" content="https://transwordly.com/trans_wordly.png" />
    <meta property="og:image:alt" content="TransWordly logosu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="TransWordly" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TransWordly" />
    <meta name="twitter:description" content="Akademik kaynaklarınızı saniyeler içinde Türkçeleştirin. PDF çeviri, ders notu ve AI soru-cevap." />
    <meta name="twitter:image" content="https://transwordly.com/trans_wordly.png" />

    <!-- Yapısal veri (JSON-LD) — arama motorları ve AI asistanları için -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://transwordly.com/#org",
          "name": "TransWordly",
          "url": "https://transwordly.com/",
          "logo": "https://transwordly.com/trans_wordly.png"
        },
        {
          "@type": "WebSite",
          "@id": "https://transwordly.com/#website",
          "url": "https://transwordly.com/",
          "name": "TransWordly",
          "inLanguage": "tr-TR",
          "publisher": { "@id": "https://transwordly.com/#org" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "TransWordly",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "inLanguage": "tr-TR",
          "url": "https://transwordly.com/",
          "description": "AI destekli belge çevirisi: PDF, Word ve slaytlarınızı 12 dilden Türkçe'ye çevirin, ders notu çıkarın, belgelerinize AI ile soru sorun.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "TRY"
          },
          "featureList": [
            "PDF ve belge çevirisi (12 dilden Türkçe'ye)",
            "Akademik format korumalı çeviri",
            "Görsel ve slaytlardan ders notu çıkarma",
            "Belgeye dayalı AI soru-cevap"
          ]
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous" />

    <title>TransWordly — AI Belge Çevirisi</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
