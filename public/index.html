<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI PDF Çeviri • EN → TR</title>
    <link rel="stylesheet" href="/styles.css?v=1" />
  </head>
  <body>
    <div class="bg">
      <div class="glow a"></div>
      <div class="glow b"></div>  
      <div class="glow c"></div>
      <div class="noise"></div>
    </div>

    <div class="wrap">
      <header class="head">
        <div class="brand">
          <div class="logo">AI</div>
          <div class="titles">
            <h1>PDF Çeviri</h1>
            <p>İngilizce → Türkçe • Yükle, çevir, indir</p>
          </div>
        </div>
        <div class="pill" id="badge">Kontrol ediliyor…</div>
      </header>

      <main class="grid">
        <section class="card">
          <div class="cardTitle">
            <h2>Dosya</h2>
            <div class="muted" id="limits"></div>
          </div>

          <label class="drop" id="drop">
            <input id="pdf" type="file" accept="application/pdf" />
            <div class="dropInner">
              <div class="dropIcon">⬆</div>
              <div class="dropText">
                <div class="dropMain" id="fileName">PDF seç veya sürükle-bırak</div>
                <div class="dropSub">Sadece PDF • EN → TR</div>
              </div>
            </div>
          </label>

          <div class="row">
            <div class="field">
              <label for="provider">Motor</label>
              <select id="provider">
                <option value="free">Ücretsiz (MyMemory)</option>
              </select>
            </div>
            <button class="btn" id="go">Çevir</button>
          </div>

          <div class="status" id="status" hidden>
            <div class="statusTop">
              <div class="tag" id="stage">Hazır</div>
              <div class="mono" id="detail"></div>
            </div>
            <div class="bar">
              <div class="barIn" id="barIn"></div>
            </div>
            <div class="actions" id="actions"></div>
          </div>
        </section>
      </main>

      <footer class="foot">
        <span class="muted">© PDF Çeviri • Yerel çalışır • Anahtarlar tarayıcıda tutulmaz</span>
      </footer>
    </div>

    <script src="/app.js?v=1"></script>
  </body>
</html>
